<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="A care home corridor — spot the slip and trip hazards">
  <rect width="800" height="500" fill="#eef2f7"/>
  <rect x="0" y="0" width="800" height="360" fill="#f4f7fb"/>
  <rect x="0" y="360" width="800" height="140" fill="#e6ebf2"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="#cbd5e1" stroke-width="3"/>

  <!-- handrail on the left wall (SAFE / good) -->
  <g>
    <rect x="40" y="196" width="230" height="12" rx="6" fill="#94a3b8"/>
    <rect x="60" y="208" width="10" height="26" fill="#94a3b8"/>
    <rect x="240" y="208" width="10" height="26" fill="#94a3b8"/>
  </g>

  <!-- wall socket + TRAILING CABLE across the walkway to a lamp (HAZARD) -->
  <g>
    <rect x="740" y="250" width="26" height="34" rx="3" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
    <path d="M746 284 C640 330 560 300 470 380 C430 415 400 420 372 452" fill="none" stroke="#1f2937" stroke-width="6" stroke-linecap="round"/>
    <!-- lamp -->
    <rect x="352" y="392" width="40" height="12" rx="3" fill="#374151"/>
    <rect x="366" y="330" width="12" height="64" fill="#6b7280"/>
    <path d="M348 330 h48 l-10 -26 h-28 z" fill="#fbbf24"/>
  </g>

  <!-- WET FLOOR puddle with NO warning sign (HAZARD) -->
  <g>
    <ellipse cx="560" cy="452" rx="80" ry="26" fill="#93c5fd" opacity="0.85"/>
    <ellipse cx="540" cy="446" rx="26" ry="8" fill="#dbeafe" opacity="0.9"/>
    <path d="M600 440 q10 -6 18 0 M610 452 q10 -6 18 0" stroke="#60a5fa" stroke-width="3" fill="none"/>
  </g>

  <!-- LOOSE RUG with a curled-up corner (HAZARD) -->
  <g transform="translate(250 420)">
    <rect x="0" y="0" width="150" height="60" rx="4" fill="#c8a06a" stroke="#8a6a44" stroke-width="2"/>
    <rect x="14" y="10" width="122" height="40" rx="2" fill="none" stroke="#8a6a44" stroke-width="2"/>
    <path d="M0 0 l34 4 l-8 -30 z" fill="#e0c088" stroke="#8a6a44" stroke-width="2"/>
  </g>

  <!-- CLUTTER: a box left in the walkway (HAZARD) -->
  <g transform="translate(90 420)">
    <rect x="0" y="0" width="90" height="60" fill="#d1b280" stroke="#8a6a44" stroke-width="2"/>
    <path d="M0 0 l18 -14 h90 l-18 14 z" fill="#e0c79a" stroke="#8a6a44" stroke-width="2"/>
    <path d="M90 0 l18 -14 v56 l-18 12 z" fill="#c2a06e" stroke="#8a6a44" stroke-width="2"/>
    <line x1="45" y1="0" x2="45" y2="60" stroke="#8a6a44" stroke-width="2"/>
  </g>

  <!-- tucked-in chair (SAFE) -->
  <g transform="translate(690 356)">
    <rect x="-4" y="-70" width="44" height="12" rx="3" fill="#64748b"/>
    <rect x="-4" y="-58" width="44" height="40" rx="3" fill="#94a3b8"/>
    <rect x="-2" y="-18" width="8" height="34" fill="#64748b"/>
    <rect x="30" y="-18" width="8" height="34" fill="#64748b"/>
  </g>
</svg>
