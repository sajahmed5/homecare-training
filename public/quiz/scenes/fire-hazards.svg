<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="A care home room — spot the fire hazards">
  <!-- room -->
  <rect width="800" height="500" fill="#eef2f7"/>
  <rect x="0" y="0" width="800" height="385" fill="#f4f7fb"/>
  <rect x="0" y="385" width="800" height="115" fill="#e2e8f0"/>
  <line x1="0" y1="385" x2="800" y2="385" stroke="#cbd5e1" stroke-width="3"/>

  <!-- ceiling smoke alarm (SAFE) -->
  <g>
    <circle cx="400" cy="46" r="24" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>
    <circle cx="400" cy="46" r="6" fill="#94a3b8"/>
    <circle cx="414" cy="38" r="3" fill="#22c55e"/>
    <path d="M384 40 h-6 M416 40 h6 M400 26 v-6" stroke="#94a3b8" stroke-width="2"/>
  </g>

  <!-- fire extinguisher on left wall (SAFE) -->
  <g transform="translate(52 210)">
    <rect x="-4" y="-16" width="30" height="8" rx="3" fill="#111827"/>
    <rect x="2" y="-8" width="18" height="12" fill="#111827"/>
    <rect x="-8" y="4" width="38" height="96" rx="12" fill="#dc2626"/>
    <rect x="-8" y="34" width="38" height="22" fill="#fca5a5" stroke="#00000022"/>
  </g>

  <!-- fire door WEDGED OPEN (HAZARD) -->
  <g transform="translate(330 150)">
    <rect x="0" y="0" width="112" height="232" rx="4" fill="#7c5b3f"/>
    <rect x="10" y="12" width="92" height="208" rx="3" fill="#8a6a4a"/>
    <rect x="26" y="34" width="60" height="26" rx="4" fill="#1d4ed8"/>
    <text x="56" y="52" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="700">FIRE DOOR</text>
    <circle cx="94" cy="120" r="5" fill="#3f3f46"/>
    <!-- wedge at base -->
    <path d="M2 232 l40 -18 v18 z" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  </g>

  <!-- window with curtains + LIT CANDLE on sill (HAZARD) -->
  <g transform="translate(560 120)">
    <rect x="0" y="0" width="180" height="150" fill="#cfe8ff" stroke="#94a3b8" stroke-width="4"/>
    <line x1="90" y1="0" x2="90" y2="150" stroke="#94a3b8" stroke-width="3"/>
    <line x1="0" y1="75" x2="180" y2="75" stroke="#94a3b8" stroke-width="3"/>
    <path d="M0 -6 q18 90 0 156 h-20 v-156 z" fill="#ef4444" opacity="0.85"/>
    <path d="M180 -6 q-18 90 0 156 h20 v-156 z" fill="#ef4444" opacity="0.85"/>
    <!-- candle on the sill -->
    <rect x="78" y="120" width="24" height="40" rx="3" fill="#fef3c7" stroke="#d6b56a"/>
    <rect x="88" y="112" width="4" height="10" fill="#111827"/>
    <path d="M90 112 c8 -8 8 -18 0 -26 c-8 8 -8 18 0 26 z" fill="#f97316"/>
  </g>

  <!-- overloaded extension socket on floor (HAZARD) -->
  <g transform="translate(110 405)">
    <rect x="0" y="18" width="120" height="34" rx="6" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
    <g fill="#4b5563">
      <rect x="12" y="4" width="18" height="18" rx="2"/><rect x="17" y="-6" width="8" height="12"/>
      <rect x="40" y="4" width="18" height="18" rx="2"/><rect x="45" y="-6" width="8" height="12"/>
      <rect x="68" y="4" width="18" height="18" rx="2"/><rect x="73" y="-6" width="8" height="12"/>
      <rect x="96" y="0" width="18" height="18" rx="2"/><rect x="101" y="-10" width="8" height="12"/>
    </g>
    <path d="M6 34 q-40 6 -60 20 M120 34 q30 6 44 22" fill="none" stroke="#334155" stroke-width="4"/>
  </g>

  <!-- exit door BLOCKED BY BOXES (HAZARD) -->
  <g transform="translate(628 300)">
    <rect x="0" y="0" width="120" height="185" rx="3" fill="#6b7280"/>
    <rect x="8" y="8" width="104" height="30" rx="3" fill="#16a34a"/>
    <text x="60" y="29" text-anchor="middle" font-family="Arial" font-size="13" fill="#fff" font-weight="700">EXIT</text>
    <rect x="86" y="100" width="6" height="20" rx="3" fill="#374151"/>
    <!-- stacked boxes in front -->
    <g fill="#c8a06a" stroke="#8a6a44" stroke-width="2">
      <rect x="-16" y="118" width="70" height="46"/>
      <rect x="30" y="132" width="70" height="52"/>
      <rect x="6" y="86" width="60" height="40"/>
    </g>
  </g>
</svg>
