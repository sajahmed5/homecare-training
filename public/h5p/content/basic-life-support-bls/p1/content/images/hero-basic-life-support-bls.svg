<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 210" width="680" height="210" role="img" aria-label="The chain of survival: call 999, early CPR, defibrillation, post-resuscitation care">
  <rect width="680" height="210" rx="16" fill="#f5f3ff"/>
  <text x="340" y="36" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#6d28d9">The chain of survival</text>
  <defs>
    <marker id="bls-arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7c3aed"/></marker>
  </defs>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(95 115)"><circle r="44" fill="#7c3aed"/><text y="-4" fill="#fff" font-size="12" font-weight="700">Call</text><text y="14" fill="#ede9fe" font-size="16" font-weight="800">999</text><text y="66" fill="#6d28d9" font-size="11" font-weight="600">Recognise &amp; call</text></g>
    <g transform="translate(255 115)"><circle r="44" fill="#7c3aed"/><text y="-2" fill="#fff" font-size="13" font-weight="800">CPR</text><text y="14" fill="#ede9fe" font-size="9">30:2</text><text y="66" fill="#6d28d9" font-size="11" font-weight="600">Early CPR</text></g>
    <g transform="translate(425 115)"><circle r="44" fill="#7c3aed"/><text y="-2" fill="#fff" font-size="13" font-weight="800">AED</text><text y="14" fill="#ede9fe" font-size="9">shock</text><text y="66" fill="#6d28d9" font-size="11" font-weight="600">Defibrillation</text></g>
    <g transform="translate(585 115)"><circle r="44" fill="#7c3aed"/><text y="-4" fill="#fff" font-size="11" font-weight="700">Post</text><text y="12" fill="#ede9fe" font-size="10">care</text><text y="66" fill="#6d28d9" font-size="11" font-weight="600">Recovery</text></g>
  </g>
  <g fill="none" stroke="#7c3aed" stroke-width="3">
    <path d="M143 115 h64" marker-end="url(#bls-arrow)"/>
    <path d="M303 115 h74" marker-end="url(#bls-arrow)"/>
    <path d="M473 115 h64" marker-end="url(#bls-arrow)"/>
  </g>
</svg>
