<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340" role="img" aria-label="Person-centred values around the individual">
  <rect width="640" height="340" rx="16" fill="#f0fdfa"/>
  <text x="320" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#0f766e">The person at the centre</text>

  <!-- spokes -->
  <g stroke="#5eead4" stroke-width="2">
    <line x1="320" y1="185" x2="150" y2="105"/>
    <line x1="320" y1="185" x2="490" y2="105"/>
    <line x1="320" y1="185" x2="120" y2="200"/>
    <line x1="320" y1="185" x2="520" y2="200"/>
    <line x1="320" y1="185" x2="220" y2="295"/>
    <line x1="320" y1="185" x2="420" y2="295"/>
  </g>

  <!-- centre -->
  <g transform="translate(320 185)">
    <circle r="56" fill="#0d9488"/>
    <circle cx="0" cy="-16" r="16" fill="#ccfbf1"/>
    <path d="M-24 30 a24 28 0 0 1 48 0 z" fill="#ccfbf1"/>
    <text y="52" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="0"> </text>
  </g>

  <!-- value pills -->
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle" font-size="12" font-weight="600">
    <g transform="translate(150 105)"><rect x="-58" y="-16" width="116" height="32" rx="16" fill="#fff" stroke="#99f6e4" stroke-width="2"/><text y="4" fill="#0f766e">Individuality</text></g>
    <g transform="translate(490 105)"><rect x="-46" y="-16" width="92" height="32" rx="16" fill="#fff" stroke="#99f6e4" stroke-width="2"/><text y="4" fill="#0f766e">Choice</text></g>
    <g transform="translate(110 200)"><rect x="-52" y="-16" width="104" height="32" rx="16" fill="#fff" stroke="#99f6e4" stroke-width="2"/><text y="4" fill="#0f766e">Privacy</text></g>
    <g transform="translate(526 200)"><rect x="-64" y="-16" width="128" height="32" rx="16" fill="#fff" stroke="#99f6e4" stroke-width="2"/><text y="4" fill="#0f766e">Independence</text></g>
    <g transform="translate(220 300)"><rect x="-46" y="-16" width="92" height="32" rx="16" fill="#fff" stroke="#99f6e4" stroke-width="2"/><text y="4" fill="#0f766e">Dignity</text></g>
    <g transform="translate(420 300)"><rect x="-46" y="-16" width="92" height="32" rx="16" fill="#fff" stroke="#99f6e4" stroke-width="2"/><text y="4" fill="#0f766e">Respect</text></g>
  </g>
</svg>
