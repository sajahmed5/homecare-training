<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" width="680" height="200" role="img" aria-label="The primary survey: Danger, Response, Airway, Breathing, Circulation">
  <rect width="680" height="200" rx="16" fill="#f5f3ff"/>
  <text x="340" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#6d28d9">The primary survey — DR ABC</text>
  <defs>
    <marker id="fa-arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7c3aed"/></marker>
  </defs>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(70 110)"><circle r="32" fill="#7c3aed"/><text y="8" fill="#fff" font-size="26" font-weight="800">D</text><text y="52" fill="#6d28d9" font-size="10" font-weight="600">Danger</text></g>
    <g transform="translate(200 110)"><circle r="32" fill="#7c3aed"/><text y="8" fill="#fff" font-size="26" font-weight="800">R</text><text y="52" fill="#6d28d9" font-size="10" font-weight="600">Response</text></g>
    <g transform="translate(330 110)"><circle r="32" fill="#7c3aed"/><text y="8" fill="#fff" font-size="26" font-weight="800">A</text><text y="52" fill="#6d28d9" font-size="10" font-weight="600">Airway</text></g>
    <g transform="translate(460 110)"><circle r="32" fill="#7c3aed"/><text y="8" fill="#fff" font-size="26" font-weight="800">B</text><text y="52" fill="#6d28d9" font-size="10" font-weight="600">Breathing</text></g>
    <g transform="translate(600 110)"><circle r="32" fill="#7c3aed"/><text y="8" fill="#fff" font-size="26" font-weight="800">C</text><text y="52" fill="#6d28d9" font-size="10" font-weight="600">Circulation</text></g>
  </g>
  <g fill="none" stroke="#7c3aed" stroke-width="3">
    <path d="M104 110 h62" marker-end="url(#fa-arrow)"/>
    <path d="M234 110 h62" marker-end="url(#fa-arrow)"/>
    <path d="M364 110 h62" marker-end="url(#fa-arrow)"/>
    <path d="M494 110 h72" marker-end="url(#fa-arrow)"/>
  </g>
</svg>
