<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 250" width="620" height="250" role="img" aria-label="Principles of good record keeping">
  <rect width="620" height="250" rx="16" fill="#f0f9ff"/>
  <text x="310" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#0369a1">Good records are…</text>

  <!-- clipboard -->
  <g transform="translate(110 140)">
    <rect x="-46" y="-60" width="92" height="130" rx="10" fill="#0284c7"/>
    <rect x="-38" y="-52" width="76" height="114" rx="6" fill="#fff"/>
    <rect x="-18" y="-70" width="36" height="18" rx="5" fill="#075985"/>
    <line x1="-26" y1="-30" x2="26" y2="-30" stroke="#bae6fd" stroke-width="4"/>
    <line x1="-26" y1="-12" x2="26" y2="-12" stroke="#bae6fd" stroke-width="4"/>
    <line x1="-26" y1="6" x2="26" y2="6" stroke="#bae6fd" stroke-width="4"/>
    <line x1="-26" y1="24" x2="10" y2="24" stroke="#bae6fd" stroke-width="4"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#075985">
    <g transform="translate(210 76)"><rect width="360" height="30" rx="15" fill="#fff" stroke="#7dd3fc" stroke-width="2"/><path d="M16 15 l6 6 10 -12" stroke="#0284c7" stroke-width="3" fill="none" stroke-linecap="round"/><text x="42" y="20">Factual — what you saw and did</text></g>
    <g transform="translate(210 114)"><rect width="360" height="30" rx="15" fill="#fff" stroke="#7dd3fc" stroke-width="2"/><path d="M16 15 l6 6 10 -12" stroke="#0284c7" stroke-width="3" fill="none" stroke-linecap="round"/><text x="42" y="20">Accurate and legible</text></g>
    <g transform="translate(210 152)"><rect width="360" height="30" rx="15" fill="#fff" stroke="#7dd3fc" stroke-width="2"/><path d="M16 15 l6 6 10 -12" stroke="#0284c7" stroke-width="3" fill="none" stroke-linecap="round"/><text x="42" y="20">Timely — written as soon as you can</text></g>
    <g transform="translate(210 190)"><rect width="360" height="30" rx="15" fill="#fff" stroke="#7dd3fc" stroke-width="2"/><path d="M16 15 l6 6 10 -12" stroke="#0284c7" stroke-width="3" fill="none" stroke-linecap="round"/><text x="42" y="20">Signed, dated and objective</text></g>
  </g>
</svg>
