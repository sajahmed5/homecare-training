<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230" width="640" height="230" role="img" aria-label="Record, report and learn from accidents and incidents">
  <rect width="640" height="230" rx="16" fill="#fffbeb"/>
  <text x="320" y="38" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#b45309">Record → Report → Learn</text>
  <defs><marker id="ai-arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#d97706"/></marker></defs>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(130 120)">
      <circle r="48" fill="#d97706"/>
      <rect x="-16" y="-20" width="32" height="40" rx="4" fill="#fff"/><line x1="-9" y1="-10" x2="9" y2="-10" stroke="#d97706" stroke-width="3"/><line x1="-9" y1="-1" x2="9" y2="-1" stroke="#d97706" stroke-width="3"/><line x1="-9" y1="8" x2="3" y2="8" stroke="#d97706" stroke-width="3"/>
      <text y="72" fill="#92400e" font-size="13" font-weight="700">Record</text>
      <text y="90" fill="#a16207" font-size="10">factually &amp; promptly</text>
    </g>
    <g transform="translate(320 120)">
      <circle r="48" fill="#d97706"/>
      <path d="M-16 -18 h30 a4 4 0 0 1 4 4 v16 a4 4 0 0 1 -4 4 h-20 l-12 10 v-10 a4 4 0 0 1 -2 0 z" fill="#fff"/>
      <text y="72" fill="#92400e" font-size="13" font-weight="700">Report</text>
      <text y="90" fill="#a16207" font-size="10">to the right person</text>
    </g>
    <g transform="translate(510 120)">
      <circle r="48" fill="#d97706"/>
      <circle cx="0" cy="-4" r="16" fill="none" stroke="#fff" stroke-width="4"/><path d="M0 -20 v-6 M0 18 v6 M-22 -4 h-6 M22 -4 h6" stroke="#fff" stroke-width="4" stroke-linecap="round"/><circle cx="0" cy="-4" r="5" fill="#fff"/>
      <text y="72" fill="#92400e" font-size="13" font-weight="700">Learn</text>
      <text y="90" fill="#a16207" font-size="10">prevent recurrence</text>
    </g>
  </g>
  <g fill="none" stroke="#d97706" stroke-width="3">
    <path d="M186 120 h80" marker-end="url(#ai-arrow)"/>
    <path d="M376 120 h80" marker-end="url(#ai-arrow)"/>
  </g>
</svg>
