<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 230" width="680" height="230" role="img" aria-label="COSHH hazard pictograms: flammable, toxic, corrosive, harmful">
  <rect width="680" height="230" rx="16" fill="#fffbeb"/>
  <text x="340" y="36" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#b45309">Know your hazard symbols</text>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <!-- Flammable -->
    <g transform="translate(110 110)">
      <polygon points="0,-56 56,0 0,56 -56,0" fill="#fff" stroke="#dc2626" stroke-width="7" stroke-linejoin="round"/>
      <path d="M2 -26 C22 -6 22 10 6 22 C14 8 2 -2 -2 -8 C0 6 -10 12 -12 22 C-26 4 -14 -14 2 -26 Z" fill="#111827"/>
      <text y="82" fill="#92400e" font-size="12" font-weight="600">Flammable</text>
    </g>
    <!-- Toxic -->
    <g transform="translate(270 110)">
      <polygon points="0,-56 56,0 0,56 -56,0" fill="#fff" stroke="#dc2626" stroke-width="7" stroke-linejoin="round"/>
      <circle cx="0" cy="-6" r="16" fill="#111827"/><circle cx="-6" cy="-8" r="3.5" fill="#fff"/><circle cx="6" cy="-8" r="3.5" fill="#fff"/>
      <path d="M-14 16 l28 12 M14 16 l-28 12" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
      <text y="82" fill="#92400e" font-size="12" font-weight="600">Toxic</text>
    </g>
    <!-- Corrosive -->
    <g transform="translate(430 110)">
      <polygon points="0,-56 56,0 0,56 -56,0" fill="#fff" stroke="#dc2626" stroke-width="7" stroke-linejoin="round"/>
      <rect x="-30" y="18" width="60" height="6" fill="#111827"/>
      <path d="M-18 -18 l0 24 M-18 6 l-8 10 M-18 6 l8 10" stroke="#111827" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M16 -14 l0 20 M16 6 l-7 9 M16 6 l7 9" stroke="#111827" stroke-width="4" fill="none" stroke-linecap="round"/>
      <text y="82" fill="#92400e" font-size="12" font-weight="600">Corrosive</text>
    </g>
    <!-- Harmful -->
    <g transform="translate(590 110)">
      <polygon points="0,-56 56,0 0,56 -56,0" fill="#fff" stroke="#dc2626" stroke-width="7" stroke-linejoin="round"/>
      <rect x="-6" y="-24" width="12" height="30" rx="4" fill="#111827"/><circle cx="0" cy="18" r="7" fill="#111827"/>
      <text y="82" fill="#92400e" font-size="12" font-weight="600">Harmful</text>
    </g>
  </g>
</svg>
