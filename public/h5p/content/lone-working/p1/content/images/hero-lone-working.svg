<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" width="640" height="240" role="img" aria-label="Staying safe when working alone">
  <rect width="640" height="240" rx="16" fill="#fffbeb"/>
  <text x="320" y="36" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#b45309">Staying safe when working alone</text>

  <!-- lone worker with phone -->
  <g transform="translate(100 140)">
    <circle cx="0" cy="-30" r="18" fill="#d97706"/>
    <path d="M-26 40 a26 30 0 0 1 52 0 z" fill="#d97706"/>
    <!-- phone -->
    <rect x="26" y="-24" width="26" height="44" rx="5" fill="#111827"/>
    <rect x="30" y="-18" width="18" height="28" rx="2" fill="#fcd34d"/>
    <circle cx="39" cy="14" r="2.5" fill="#fcd34d"/>
    <text y="80" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#92400e" font-weight="600">Keep in touch</text>
  </g>

  <!-- safety steps -->
  <g font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#92400e">
    <g transform="translate(230 70)"><rect width="360" height="32" rx="16" fill="#fff" stroke="#fcd34d" stroke-width="2"/><circle cx="24" cy="16" r="6" fill="#d97706"/><text x="42" y="21">Plan your visit and share your schedule</text></g>
    <g transform="translate(230 110)"><rect width="360" height="32" rx="16" fill="#fff" stroke="#fcd34d" stroke-width="2"/><circle cx="24" cy="16" r="6" fill="#d97706"/><text x="42" y="21">Follow check-in / check-out procedures</text></g>
    <g transform="translate(230 150)"><rect width="360" height="32" rx="16" fill="#fff" stroke="#fcd34d" stroke-width="2"/><circle cx="24" cy="16" r="6" fill="#d97706"/><text x="42" y="21">Stay alert — trust your instincts</text></g>
    <g transform="translate(230 190)"><rect width="360" height="32" rx="16" fill="#fff" stroke="#fcd34d" stroke-width="2"/><circle cx="24" cy="16" r="6" fill="#d97706"/><text x="42" y="21">If it feels unsafe, leave and raise the alarm</text></g>
  </g>
</svg>
