<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210" width="640" height="210" role="img" aria-label="Illustration for Personal safety and de-escalation">
  <style>
    .bob { animation: bob 4.5s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 100%; }
    .blink { animation: blink 6s step-end infinite; transform-box: fill-box; transform-origin: 50% 50%; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 50%; }
    .rise { animation: rise .5s ease-out both; }
    @keyframes bob { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-4px) } }
    @keyframes blink { 0%,92%,100% { transform: scaleY(1) } 95% { transform: scaleY(.1) } }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity:.9 } 50% { transform: scale(1.09); opacity:1 } }
    @keyframes rise { from { opacity:0; transform: translateY(6px) } to { opacity:1; transform: translateY(0) } }
    @media (prefers-reduced-motion: reduce) {
      .bob, .blink, .pulse, .rise { animation: none }
    }
  </style>
  <rect width="640" height="210" rx="18" fill="#fcf5ee"/>
  <text x="32" y="42" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#d97706">Staying safe on visits and de-escalating tensi</text>
  <g transform="translate(96 132)">
  <g class="bob" style="animation-delay:0.0s">
    <path d="M-30 46 a30 34 0 0 1 60 0 z" fill="#d97706"/>
    <path d="M-9 14 h18 v14 h-18 z" fill="#f1c27d"/>
    <circle cx="0" cy="-8" r="20" fill="#f1c27d"/>
    <g fill="#4a3728"><circle cx="-13" cy="-32" r="9"/><circle cx="0" cy="-38" r="10"/><circle cx="13" cy="-32" r="9"/></g>
    <g class="blink">
      <circle cx="-7" cy="-10" r="2.2" fill="#1f2937"/>
      <circle cx="7" cy="-10" r="2.2" fill="#1f2937"/>
    </g>
    <path d="M-7 0 q7 6 14 0" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-11" cy="-2" r="3.5" fill="#f87171" opacity=".28"/>
    <circle cx="11" cy="-2" r="3.5" fill="#f87171" opacity=".28"/>
    <g transform="translate(34 -10)"><g class="pulse"><path d="M15 0 L30 28 H0 Z" fill="#d97706" opacity=".9"/><rect x="13" y="10" width="4" height="10" rx="2" fill="#fff"/><circle cx="15" cy="24" r="2.2" fill="#fff"/></g></g>
  </g></g>
  
</svg>
