<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 250" width="660" height="250" role="img" aria-label="The five principles of the Mental Capacity Act 2005">
  <rect width="660" height="250" rx="16" fill="#fff1f2"/>
  <text x="330" y="36" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#be123c">The 5 principles of the Mental Capacity Act</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(40 66)"><rect width="580" height="30" rx="15" fill="#fff" stroke="#fecdd3" stroke-width="2"/><circle cx="16" cy="15" r="11" fill="#e11d48"/><text x="16" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">1</text><text x="38" y="19" fill="#9f1239" font-size="12" font-weight="600">Assume a person has capacity unless proven otherwise</text></g>
    <g transform="translate(40 104)"><rect width="580" height="30" rx="15" fill="#fff" stroke="#fecdd3" stroke-width="2"/><circle cx="16" cy="15" r="11" fill="#e11d48"/><text x="16" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">2</text><text x="38" y="19" fill="#9f1239" font-size="12" font-weight="600">Support people to make their own decisions</text></g>
    <g transform="translate(40 142)"><rect width="580" height="30" rx="15" fill="#fff" stroke="#fecdd3" stroke-width="2"/><circle cx="16" cy="15" r="11" fill="#e11d48"/><text x="16" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">3</text><text x="38" y="19" fill="#9f1239" font-size="12" font-weight="600">People can make unwise decisions</text></g>
    <g transform="translate(40 180)"><rect width="580" height="30" rx="15" fill="#fff" stroke="#fecdd3" stroke-width="2"/><circle cx="16" cy="15" r="11" fill="#e11d48"/><text x="16" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">4</text><text x="38" y="19" fill="#9f1239" font-size="12" font-weight="600">Any decision made for them must be in their best interests</text></g>
    <g transform="translate(40 218)"><rect width="580" height="30" rx="15" fill="#fff" stroke="#fecdd3" stroke-width="2"/><circle cx="16" cy="15" r="11" fill="#e11d48"/><text x="16" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">5</text><text x="38" y="19" fill="#9f1239" font-size="12" font-weight="600">Choose the least restrictive option</text></g>
  </g>
</svg>
