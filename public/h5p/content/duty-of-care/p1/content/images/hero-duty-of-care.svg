<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-label="Balancing duty of care with a person's rights and choices">
  <rect width="600" height="300" rx="16" fill="#f0fdfa"/>
  <text x="300" y="38" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#0f766e">Balancing safety and choice</text>

  <!-- stand -->
  <rect x="294" y="80" width="12" height="150" rx="4" fill="#0d9488"/>
  <path d="M250 236 h100 l-14 16 h-72 z" fill="#0d9488"/>
  <circle cx="300" cy="80" r="8" fill="#0f766e"/>

  <!-- beam -->
  <rect x="140" y="76" width="320" height="10" rx="5" fill="#0d9488" transform="rotate(-4 300 81)"/>

  <!-- left pan: Duty of care / safety -->
  <g transform="translate(170 66)">
    <line x1="0" y1="0" x2="-26" y2="46" stroke="#0d9488" stroke-width="2"/>
    <line x1="0" y1="0" x2="26" y2="46" stroke="#0d9488" stroke-width="2"/>
    <path d="M-40 46 a40 22 0 0 0 80 0 z" fill="#99f6e4" stroke="#0d9488" stroke-width="2"/>
    <text y="82" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f766e">Duty of care</text>
    <text y="98" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#115e59">keeping people safe</text>
  </g>

  <!-- right pan: Rights / choice -->
  <g transform="translate(430 96)">
    <line x1="0" y1="0" x2="-26" y2="46" stroke="#0d9488" stroke-width="2"/>
    <line x1="0" y1="0" x2="26" y2="46" stroke="#0d9488" stroke-width="2"/>
    <path d="M-40 46 a40 22 0 0 0 80 0 z" fill="#99f6e4" stroke="#0d9488" stroke-width="2"/>
    <text y="82" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f766e">Rights &amp; choice</text>
    <text y="98" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#115e59">respecting the person</text>
  </g>
</svg>
