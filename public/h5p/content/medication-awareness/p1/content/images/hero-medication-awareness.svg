<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 250" width="660" height="250" role="img" aria-label="The six rights of safe medication">
  <rect width="660" height="250" rx="16" fill="#f5f3ff"/>
  <text x="330" y="38" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#6d28d9">The 6 rights of medication</text>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle" font-size="13" font-weight="700">
    <g transform="translate(115 100)"><circle r="42" fill="#7c3aed"/><text y="-4" fill="#fff" font-size="18">1</text><text y="16" fill="#ede9fe" font-size="12">Person</text><text y="66" fill="#6d28d9">Right person</text></g>
    <g transform="translate(275 100)"><circle r="42" fill="#7c3aed"/><text y="-4" fill="#fff" font-size="18">2</text><text y="16" fill="#ede9fe" font-size="12">Medicine</text><text y="66" fill="#6d28d9">Right medicine</text></g>
    <g transform="translate(435 100)"><circle r="42" fill="#7c3aed"/><text y="-4" fill="#fff" font-size="18">3</text><text y="16" fill="#ede9fe" font-size="12">Dose</text><text y="66" fill="#6d28d9">Right dose</text></g>
    <g transform="translate(195 190)"><circle r="42" fill="#7c3aed"/><text y="-4" fill="#fff" font-size="18">4</text><text y="16" fill="#ede9fe" font-size="12">Time</text><text y="66" fill="#6d28d9">Right time</text></g>
    <g transform="translate(355 190)"><circle r="42" fill="#7c3aed"/><text y="-4" fill="#fff" font-size="18">5</text><text y="16" fill="#ede9fe" font-size="12">Route</text><text y="66" fill="#6d28d9">Right route</text></g>
    <g transform="translate(545 145)"><circle r="42" fill="#7c3aed"/><text y="-4" fill="#fff" font-size="18">6</text><text y="16" fill="#ede9fe" font-size="10">Record</text><text y="66" fill="#6d28d9">Right record</text></g>
  </g>
</svg>
