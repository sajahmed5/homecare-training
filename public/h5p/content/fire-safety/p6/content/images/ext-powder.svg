<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 150" width="360" height="150" role="img" aria-label="Dry powder fire extinguisher, blue label">
  <rect width="360" height="150" rx="12" fill="#f8fafc"/>
  <rect x="150" y="150" width="0" height="0"/>
  <!-- handle + neck -->
  <rect x="176" y="12" width="46" height="9" rx="4" fill="#111827"/>
  <rect x="170" y="20" width="22" height="16" fill="#111827"/>
  <circle cx="205" cy="30" r="7" fill="#e5e7eb" stroke="#111827" stroke-width="2"/>
  <!-- body -->
  <rect x="150" y="34" width="60" height="100" rx="16" fill="#dc2626"/>
  <!-- colour-coded label band -->
  <rect x="150" y="62" width="60" height="34" fill="#2563eb" stroke="#00000033" stroke-width="1.5"/>
  <!-- base -->
  <rect x="150" y="128" width="60" height="8" rx="4" fill="#991b1b"/>
</svg>