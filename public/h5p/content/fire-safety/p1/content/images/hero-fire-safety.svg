<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340" role="img" aria-label="The fire triangle: heat, fuel and oxygen">
  <rect width="600" height="340" rx="16" fill="#fff7ed"/>
  <text x="300" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#c2410c">The fire triangle</text>
  <text x="300" y="62" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#9a3412">Remove any one side and the fire goes out</text>

  <!-- triangle -->
  <polygon points="300,90 470,285 130,285" fill="none" stroke="#ea580c" stroke-width="4" stroke-linejoin="round"/>

  <!-- flame in centre -->
  <g transform="translate(300 228)">
    <path d="M0 -46 C26 -20 30 4 12 22 C22 6 8 -6 2 -14 C4 2 -6 10 -10 20 C-26 2 -18 -22 0 -46 Z" fill="#f97316">
      <animateTransform attributeName="transform" type="scale" values="1 1;1.06 1.12;1 1" dur="1.1s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="fill" values="#f97316;#fb923c;#f97316" dur="1.1s" repeatCount="indefinite"/>
    </path>
    <path d="M0 -26 C12 -12 14 2 5 12 C10 3 3 -3 0 -8 C1 1 -4 6 -6 11 C-14 1 -10 -12 0 -26 Z" fill="#fbbf24">
      <animateTransform attributeName="transform" type="scale" values="1 1;0.92 1.1;1 1" dur="0.9s" repeatCount="indefinite" additive="sum"/>
    </path>
  </g>

  <!-- corner labels -->
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(300 78)"><rect x="-34" y="-20" width="68" height="30" rx="15" fill="#ea580c"/><text y="0" fill="#fff" font-size="14" font-weight="700">HEAT</text></g>
    <g transform="translate(482 300)"><rect x="-30" y="-16" width="60" height="30" rx="15" fill="#ea580c"/><text y="4" fill="#fff" font-size="14" font-weight="700">FUEL</text></g>
    <g transform="translate(118 300)"><rect x="-44" y="-16" width="88" height="30" rx="15" fill="#ea580c"/><text y="4" fill="#fff" font-size="13" font-weight="700">OXYGEN</text></g>
  </g>
</svg>
