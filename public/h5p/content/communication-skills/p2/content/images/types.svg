<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200" role="img" aria-label="Four types of communication: verbal, non-verbal, written, visual and assistive">
  <rect width="600" height="200" rx="16" fill="#f0fdfa"/>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <!-- Verbal -->
    <g transform="translate(80 40)">
      <rect x="-58" y="0" width="116" height="130" rx="12" fill="#fff" stroke="#99f6e4" stroke-width="2"/>
      <circle cx="0" cy="40" r="26" fill="#ccfbf1"/>
      <path d="M-14 32 h28 a6 6 0 0 1 6 6 v10 a6 6 0 0 1 -6 6 h-16 l-10 8 v-8 a6 6 0 0 1 -2 -0 z" fill="#0d9488"/>
      <text x="0" y="92" font-size="14" font-weight="700" fill="#0f766e">Verbal</text>
      <text x="0" y="110" font-size="10" fill="#475569">tone &amp; words</text>
    </g>
    <!-- Non-verbal -->
    <g transform="translate(225 40)">
      <rect x="-58" y="0" width="116" height="130" rx="12" fill="#fff" stroke="#99f6e4" stroke-width="2"/>
      <circle cx="0" cy="40" r="26" fill="#ccfbf1"/>
      <circle cx="0" cy="32" r="8" fill="#0d9488"/>
      <path d="M-12 58 a12 14 0 0 1 24 0 z" fill="#0d9488"/>
      <text x="0" y="92" font-size="14" font-weight="700" fill="#0f766e">Non-verbal</text>
      <text x="0" y="110" font-size="10" fill="#475569">body language</text>
    </g>
    <!-- Written -->
    <g transform="translate(370 40)">
      <rect x="-58" y="0" width="116" height="130" rx="12" fill="#fff" stroke="#99f6e4" stroke-width="2"/>
      <rect x="-16" y="18" width="32" height="42" rx="4" fill="#0d9488"/>
      <line x1="-9" y1="30" x2="9" y2="30" stroke="#ccfbf1" stroke-width="3"/>
      <line x1="-9" y1="39" x2="9" y2="39" stroke="#ccfbf1" stroke-width="3"/>
      <line x1="-9" y1="48" x2="3" y2="48" stroke="#ccfbf1" stroke-width="3"/>
      <text x="0" y="92" font-size="14" font-weight="700" fill="#0f766e">Written</text>
      <text x="0" y="110" font-size="10" fill="#475569">notes &amp; records</text>
    </g>
    <!-- Visual -->
    <g transform="translate(515 40)">
      <rect x="-58" y="0" width="116" height="130" rx="12" fill="#fff" stroke="#99f6e4" stroke-width="2"/>
      <rect x="-18" y="20" width="16" height="16" rx="3" fill="#0d9488"/>
      <circle cx="12" cy="28" r="9" fill="#14b8a6"/>
      <path d="M-14 52 l10 -12 8 10 8 -8 v10 z" fill="#0f766e"/>
      <text x="0" y="92" font-size="14" font-weight="700" fill="#0f766e">Visual</text>
      <text x="0" y="110" font-size="10" fill="#475569">signs &amp; symbols</text>
    </g>
  </g>
</svg>
