<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-label="Animated active listening: sound travelling from a speaker to a listener's ear">
  <rect width="600" height="300" rx="16" fill="#ecfeff"/>
  <text x="300" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#0e7490">Active listening</text>

  <!-- speaker (left) -->
  <g transform="translate(120 170)">
    <circle r="46" fill="#0d9488"/>
    <circle cx="0" cy="-14" r="14" fill="#ccfbf1"/>
    <path d="M-22 34 a22 26 0 0 1 44 0 z" fill="#ccfbf1"/>
    <text x="0" y="86" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0f766e">Speaker</text>
  </g>

  <!-- travelling sound waves -->
  <g fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round">
    <path d="M215 150 q26 20 0 40">
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="0s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;150 0" dur="2.4s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path d="M215 150 q26 20 0 40">
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;150 0" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M215 150 q26 20 0 40">
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;150 0" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- listener with highlighted ear (right) -->
  <g transform="translate(470 170)">
    <circle r="46" fill="#0891b2"/>
    <circle cx="0" cy="-14" r="14" fill="#cffafe"/>
    <path d="M-22 34 a22 26 0 0 1 44 0 z" fill="#cffafe"/>
    <!-- ear -->
    <path d="M-44 -6 a12 14 0 1 1 6 20 q-4 6 2 10" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round">
      <animate attributeName="stroke" values="#f59e0b;#fbbf24;#f59e0b" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <text x="0" y="86" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0e7490">Listener</text>
  </g>

  <text x="300" y="284" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#155e75">Face the person · give them time · reflect back what you hear</text>
</svg>
