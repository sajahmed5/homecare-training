<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200" role="img" aria-label="Barriers to communication: physical, sensory, cognitive, language, emotional">
  <rect width="600" height="200" rx="16" fill="#fff7ed"/>
  <text x="300" y="30" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#c2410c">Barriers to communication</text>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <!-- Physical: noise -->
    <g transform="translate(70 70)">
      <circle r="30" fill="#ffedd5"/>
      <path d="M-12 -6 h8 l10 -9 v30 l-10 -9 h-8 z" fill="#ea580c"/>
      <path d="M12 -8 q8 8 0 16 M18 -14 q14 14 0 28" fill="none" stroke="#ea580c" stroke-width="3"/>
      <text x="0" y="52" font-size="11" font-weight="600" fill="#9a3412">Physical</text>
    </g>
    <!-- Sensory: eye/ear -->
    <g transform="translate(180 70)">
      <circle r="30" fill="#ffedd5"/>
      <path d="M-16 0 q16 -14 32 0 q-16 14 -32 0 z" fill="none" stroke="#ea580c" stroke-width="3"/>
      <circle r="6" fill="#ea580c"/>
      <text x="0" y="52" font-size="11" font-weight="600" fill="#9a3412">Sensory</text>
    </g>
    <!-- Cognitive: brain -->
    <g transform="translate(300 70)">
      <circle r="30" fill="#ffedd5"/>
      <path d="M-10 -12 a12 12 0 0 0 -6 20 a10 10 0 0 0 6 12 M2 -12 a12 12 0 0 1 6 20 a10 10 0 0 1 -6 12 M-4 -14 v42" fill="none" stroke="#ea580c" stroke-width="3"/>
      <text x="0" y="52" font-size="11" font-weight="600" fill="#9a3412">Cognitive</text>
    </g>
    <!-- Language: globe -->
    <g transform="translate(420 70)">
      <circle r="30" fill="#ffedd5"/>
      <circle r="16" fill="none" stroke="#ea580c" stroke-width="3"/>
      <path d="M-16 0 h32 M0 -16 v32 M-11 -10 q11 10 0 20 q-11 -10 0 -20 M11 -10 q-11 10 0 20 q11 -10 0 -20" fill="none" stroke="#ea580c" stroke-width="2"/>
      <text x="0" y="52" font-size="11" font-weight="600" fill="#9a3412">Language</text>
    </g>
    <!-- Emotional: heart -->
    <g transform="translate(530 70)">
      <circle r="30" fill="#ffedd5"/>
      <path d="M0 12 C-18 -2 -12 -18 0 -8 C12 -18 18 -2 0 12 z" fill="#ea580c"/>
      <text x="0" y="52" font-size="11" font-weight="600" fill="#9a3412">Emotional</text>
    </g>
  </g>
</svg>
