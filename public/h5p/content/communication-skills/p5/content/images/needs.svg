<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 190" width="600" height="190" role="img" aria-label="Adapting communication to individual needs: hearing, sight, easy-read, time">
  <rect width="600" height="190" rx="16" fill="#f0fdf4"/>
  <text x="300" y="30" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">Adapt to the individual</text>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <!-- Hearing aid -->
    <g transform="translate(90 75)">
      <circle r="30" fill="#dcfce7"/>
      <path d="M-6 -12 a14 16 0 1 1 8 26 q-6 4 -2 10" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
      <text x="0" y="52" font-size="11" font-weight="600" fill="#166534">Hearing</text>
    </g>
    <!-- Sight / glasses -->
    <g transform="translate(230 75)">
      <circle r="30" fill="#dcfce7"/>
      <circle cx="-9" cy="0" r="8" fill="none" stroke="#16a34a" stroke-width="3"/>
      <circle cx="9" cy="0" r="8" fill="none" stroke="#16a34a" stroke-width="3"/>
      <path d="M-1 0 h2 M-17 -3 l-5 -3 M17 -3 l5 -3" stroke="#16a34a" stroke-width="3" fill="none"/>
      <text x="0" y="52" font-size="11" font-weight="600" fill="#166534">Sight</text>
    </g>
    <!-- Easy-read -->
    <g transform="translate(370 75)">
      <circle r="30" fill="#dcfce7"/>
      <rect x="-14" y="-14" width="28" height="28" rx="4" fill="#16a34a"/>
      <circle cx="-5" cy="-4" r="4" fill="#dcfce7"/>
      <line x1="2" y1="-6" x2="10" y2="-6" stroke="#dcfce7" stroke-width="3"/>
      <line x1="-10" y1="6" x2="10" y2="6" stroke="#dcfce7" stroke-width="3"/>
      <text x="0" y="52" font-size="11" font-weight="600" fill="#166534">Easy-read</text>
    </g>
    <!-- Time -->
    <g transform="translate(510 75)">
      <circle r="30" fill="#dcfce7"/>
      <circle r="16" fill="none" stroke="#16a34a" stroke-width="3"/>
      <path d="M0 -10 v10 l7 6" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
      <text x="0" y="52" font-size="11" font-weight="600" fill="#166534">Give time</text>
    </g>
  </g>
</svg>
